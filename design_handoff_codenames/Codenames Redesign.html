<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CODENAMES · Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@500;600;700;800&family=Hanken+Grotesk:wght@500;600;700;800&family=Nunito:wght@600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #ECE6DC; }
  * { -webkit-font-smoothing: antialiased; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="codenames-board.jsx"></script>

<script type="text/babel">
  const { useState } = React;

  function App() {
    const dirs = [
      { key: 'hearth',   label: 'A · Hearth',   sub: 'Warm paper · daytime cozy' },
      { key: 'lantern',  label: 'B · Lantern',  sub: 'Warm charcoal · game night' },
      { key: 'sunbloom', label: 'C · Sunbloom', sub: 'Bright warm · soft modern' },
    ];
    return (
      <DesignCanvas>
        <DCSection id="game" title="CODENAMES · Spymaster view" subtitle="Same board state · three warm directions to compare">
          {dirs.map(d => (
            <DCArtboard key={d.key} id={d.key} label={d.label} width={402} height={874}>
              <IOSDevice dark={d.key === 'lantern'}>
                <CodenamesBoard themeKey={d.key} />
              </IOSDevice>
            </DCArtboard>
          ))}
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
